<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"> <!-- Character encoding -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Responsive design -->
  <title>Image Gallery</title> <!-- Page title -->

  <style>
    /* Page body style */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f4f4f4;
      text-align: center;
    }

    /* Main heading */
    h1 {
      margin-bottom: 20px;
      color: #333;
    }

    /* Filter buttons container */
    .filters {
      margin-bottom: 20px;
    }

    /* Filter buttons style */
    .filters button {
      padding: 10px 15px;
      margin: 5px;
      border: none;
      background: #333;
      color: white;
      cursor: pointer;
      border-radius: 5px;
      transition: 0.3s;
    }

    /* Hover effect for buttons */
    .filters button:hover {
      background: #555;
    }

    /* Gallery container */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 15px;
      max-width: 1000px;
      margin: auto;
    }

    /* Each gallery image box */
    .gallery-item {
      overflow: hidden;
      border-radius: 10px;
      cursor: pointer;
      position: relative;
    }

    /* Gallery images */
    .gallery img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-radius: 10px;
      transition: transform 0.4s ease, filter 0.4s ease;
    }

    /* Hover effect on images */
    .gallery img:hover {
      transform: scale(1.08);
      filter: brightness(80%);
    }

    /* Lightbox background */
    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.9);
      justify-content: center;
      align-items: center;
      z-index: 1000;
      flex-direction: column;
    }

    /* Lightbox image */
    .lightbox img {
      max-width: 80%;
      max-height: 70vh;
      border-radius: 10px;
      transition: 0.4s;
    }

    /* Lightbox buttons */
    .lightbox button {
      margin: 10px;
      padding: 10px 15px;
      border: none;
      background: white;
      color: black;
      cursor: pointer;
      border-radius: 5px;
      font-size: 16px;
    }

    /* Close button */
    .close {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 30px;
      color: white;
      cursor: pointer;
    }

    /* Responsive for small screens */
    @media (max-width: 600px) {
      .gallery img {
        height: 180px;
      }

      .lightbox img {
        max-width: 95%;
      }
    }
  </style>
</head>
<body>

  <h1>Image Gallery</h1> <!-- Gallery title -->

  <!-- Filter buttons -->
  <div class="filters">
    <button onclick="filterImages('all')">All</button>
    <button onclick="filterImages('nature')">Nature</button>
    <button onclick="filterImages('city')">City</button>
    <button onclick="filterImages('animals')">Animals</button>
  </div>

  <!-- Gallery container -->
  <div class="gallery" id="gallery">
    <div class="gallery-item nature">
      <img src="https://picsum.photos/id/1018/400/300" alt="Nature 1" onclick="openLightbox(0)">
    </div>

    <div class="gallery-item city">
      <img src="https://picsum.photos/id/1011/400/300" alt="City 1" onclick="openLightbox(1)">
    </div>

    <div class="gallery-item animals">
      <img src="https://picsum.photos/id/1025/400/300" alt="Animal 1" onclick="openLightbox(2)">
    </div>

    <div class="gallery-item nature">
      <img src="https://picsum.photos/id/1039/400/300" alt="Nature 2" onclick="openLightbox(3)">
    </div>

    <div class="gallery-item city">
      <img src="https://picsum.photos/id/1043/400/300" alt="City 2" onclick="openLightbox(4)">
    </div>

    <div class="gallery-item animals">
      <img src="https://picsum.photos/id/1062/400/300" alt="Animal 2" onclick="openLightbox(5)">
    </div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <span class="close" onclick="closeLightbox()">×</span> <!-- Close button -->
    <img id="lightbox-img" src="" alt="Large View"> <!-- Large image -->
    <div>
      <button onclick="prevImage()">Prev</button> <!-- Previous image button -->
      <button onclick="nextImage()">Next</button> <!-- Next image button -->
    </div>
  </div>

  <script>
    // Get all gallery images
    const images = document.querySelectorAll(".gallery img");

    // Get lightbox elements
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = document.getElementById("lightbox-img");

    // Current image index
    let currentIndex = 0;

    // Open lightbox function
    function openLightbox(index) {
      currentIndex = index;
      lightbox.style.display = "flex";
      lightboxImg.src = images[currentIndex].src;
    }

    // Close lightbox function
    function closeLightbox() {
      lightbox.style.display = "none";
    }

    // Show next image
    function nextImage() {
      currentIndex = (currentIndex + 1) % images.length;
      lightboxImg.src = images[currentIndex].src;
    }

    // Show previous image
    function prevImage() {
      currentIndex = (currentIndex - 1 + images.length) % images.length;
      lightboxImg.src = images[currentIndex].src;
    }

    // Filter images by category
    function filterImages(category) {
      const items = document.querySelectorAll(".gallery-item");

      items.forEach(item => {
        if (category === "all" || item.classList.contains(category)) {
          item.style.display = "block";
        } else {
          item.style.display = "none";
        }
      });
    }

    // Close lightbox when clicking outside image
    lightbox.addEventListener("click", function(e) {
      if (e.target === lightbox) {
        closeLightbox();
      }
    });
  </script>

</body>
</html>
